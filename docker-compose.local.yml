services:
  postgres:
    image: postgres:18
    container_name: tcg-search-postgres
    environment:
      POSTGRES_DB: tcg_search
      POSTGRES_USER: tcg_search
      POSTGRES_PASSWORD: tcg_search
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcg_search -d tcg_search"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      org.springframework.boot.service-connection: postgres

volumes:
  postgres_data:
