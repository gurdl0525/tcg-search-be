spring:
  config:
    activate:
      on-profile: local

  # migration
  flyway:
    enabled: true

  # DB
  datasource:
    driver-class-name: org.postgresql.Driver
    username: tcg_search
    password: tcg_search
    url: jdbc:postgresql://localhost:5432/tcg_search

  # ORM
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true

app:
  security:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173"
      allowed-methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      allowed-headers: "Authorization,Content-Type,Accept,Origin"
      exposed-headers: "Location"
      max-age: 3600

  auth:
    jwt:
      issuer: "http://localhost:8080"
      secret: ${SECURITY_JWT_SECRET:tcg-search-local-development-secret-change-before-production}
      access-token-ttl: 15m
    refresh-token:
      ttl: 30d

# management
management:
  endpoints:
    web:
      exposure:
        include: health,info,heapdump,shutdown

  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

    heapdump:
      access: read_only

    shutdown:
      access: read_only
