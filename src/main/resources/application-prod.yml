spring:
  config:
    activate:
      on-profile: prod

app:
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS}
      allowed-methods: ${APP_SECURITY_CORS_ALLOWED_METHODS}
      allowed-headers: ${APP_SECURITY_CORS_ALLOWED_HEADERS}
      exposed-headers: ${APP_SECURITY_CORS_EXPOSED_HEADERS}
      max-age: ${APP_SECURITY_CORS_MAX_AGE}

  auth:
    jwt:
      issuer: ${SECURITY_JWT_ISSUER_URI}
      secret: ${SECURITY_JWT_SECRET}
      access-token-ttl: ${SECURITY_JWT_ACCESS_TOKEN_TTL}
    refresh-token:
      ttl: ${SECURITY_REFRESH_TOKEN_TTL}